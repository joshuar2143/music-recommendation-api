{% extends "base.html" %}

{% block title %}Genres — Music API{% endblock %}

{% block content %}
<div class="rounded-3xl border border-amber-600/40 bg-gradient-to-br from-amber-900/20 to-slate-900/40 p-6 shadow-lg shadow-amber-900/30">
  <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <p class="text-sm uppercase tracking-[0.32em] text-amber-400 font-semibold">Genre summary</p>
      <h1 class="mt-3 text-3xl font-bold bg-gradient-to-r from-amber-300 to-orange-300 bg-clip-text text-transparent">Genres</h1>
      <p class="mt-2 text-slate-300">Browse all available song genres and counts.</p>
    </div>
  </div>

  <div class="mt-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
    {% for genre in genres %}
    <div class="rounded-3xl border border-amber-600/40 bg-gradient-to-br from-amber-900/30 to-slate-900/50 p-5 hover:shadow-lg hover:shadow-amber-600/30 transition cursor-pointer group">
      <p class="text-sm text-amber-400 font-semibold group-hover:text-amber-300 transition">{{ genre.genre }}</p>
      <p class="mt-3 text-3xl font-bold text-amber-200">{{ genre.count }} 🎵</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
